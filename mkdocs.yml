# Isolated Agents SDK Documentation

site_name: Isolated Agents SDK
site_description: Production-ready SDK for running AI agents in isolated containers
site_author: Isolated Agents Team
site_url: https://isolated-agents.vercel.app


repo_name: Tech-Vexy/Isolated-Agents
repo_url: https://github.com/Tech-Vexy/Isolated-Agents
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/shield-lock

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Tech-Vexy/Isolated-Agents
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/EVeldrine
  
copyright: |
  Built with <a href="https://bob.ibm.com" target="_blank" rel="noopener">IBM BOB</a> 
  <img src="https://bob.ibm.com/images/static_torso_fragment.svg" alt="IBM BOB Logo" width="20" style="vertical-align: middle; margin-left: 5px;">

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - tags:
      tags_file: tags.md

nav:
  - Home:
    - index.md
    - Getting Started: getting-started.md

  - Architecture:
    - Adapter Pattern: ADAPTER_ARCHITECTURE.md
    - Agent Runtime: AGENT_RUNTIME.md

  - Features:
    - Decorators: DECORATORS.md
    - Composability: COMPOSABILITY.md
    - Multimodal Outputs: MULTIMODAL_OUTPUTS.md
    - Validation: EXPECT_SEQUENCES.md
    - Telemetry & Logging: TELEMETRY_LOGGING.md
    - Framework Compatibility: FRAMEWORK_COMPATIBILITY.md
    - Long-Running Agents: LONG_RUNNING_AGENTS.md
    - Agent Communication: AGENT_COMMUNICATION.md

  - Guides:
    - Migration: MIGRATION_GUIDE.md
    - Extending Adapters: EXTENDING_ADAPTERS.md
    - Cross-Platform: CROSSPLATFORM_COMPATIBILITY.md

  - Examples:
    - Overview: EXAMPLES_CATALOG.md

# Made with Bob
